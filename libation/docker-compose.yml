services:
  libation-server:
    container_name: libation-server
    image: rmcrackan/libation:latest 
    volumes:
      # Local config files, read-only
      - ./config:/config
      # Named volumes for books.
      - libation_books:/data
    restart: unless-stopped

volumes:
  libation_books:
    name: libation_books


