services:
  linkding:
    container_name: linkding
    image: sissbruecker/linkding:1.45.0
    restart: always
    environment:
      - LD_SUPERUSER_NAME=${LD_SUPERUSER_NAME:-admin}
      - LD_SUPERUSER_PASSWORD=${LD_SUPERUSER_PASSWORD}
    volumes:
      - linkding_data:/etc/linkding/data
    networks:
      - default
      - shared

volumes:
  linkding_data:
    name: linkding_data
networks:
  default:
    name: linkding_network
  shared:
    name: npmnet
    external: true


